name: Daily pipeline

on:
  schedule:
    - cron: '30 7 * * 1-5'  # 09:30 CEST (summer, UTC+2)
    - cron: '30 8 * * 1-5'  # 09:30 CET  (winter, UTC+1)
  workflow_dispatch:          # allow manual runs from GitHub UI

jobs:
  # Time-gate: both crons fire, but only the one landing at hour 09 Stockholm proceeds.
  check-time:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        run: |
          HOUR=$(TZ='Europe/Stockholm' date +%H)
          [ "$HOUR" = "09" ] && echo "should-run=true" >> $GITHUB_OUTPUT \
                             || echo "should-run=false" >> $GITHUB_OUTPUT

  run-pipeline:
    needs: check-time
    if: needs.check-time.outputs.should-run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          CURRENTAPI_KEY: ${{ secrets.CURRENTAPI_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python pipeline/run_daily.py

      - name: Commit and push output
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/snapshots/${DATE}.json content/news/${DATE}.json content/drafts/${DATE}.md
          git diff --cached --quiet || git commit -m "Pipeline run ${DATE}"
          git push
